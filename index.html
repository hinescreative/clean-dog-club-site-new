  <!-- Component Logic -->
  <script type="text/babel">
    /* --- Primitives --- */
    function Icon({ name, size = 20, stroke = 1.75, style }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const el = document.createElement('i');
          el.setAttribute('data-lucide', name);
          ref.current.appendChild(el);
          window.lucide.createIcons({ attrs: { 'stroke-width': stroke, width: size, height: size } });
        }
      }, [name, size, stroke]);
      return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', ...style }} />;
    }

    function Button({ variant = 'primary', size = 'md', type = 'button', children, onClick, style }) {
      const base = {
        fontFamily: 'var(--font-body)',
        fontWeight: 600,
        borderRadius: '999px',
        border: '1px solid transparent',
        cursor: 'pointer',
        transition: 'all 240ms cubic-bezier(0.25, 0.8, 0.25, 1)',
        display: 'inline-flex',
        alignItems: 'center',
        gap: 8,
        whiteSpace: 'nowrap',
      };
      const sizes = {
        sm: { padding: '8px 16px', fontSize: 13 },
        md: { padding: '12px 22px', fontSize: 14 },
        lg: { padding: '16px 28px', fontSize: 15 },
      };
      const variants = {
        primary:   { background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)' },
        secondary: { background: 'transparent', color: 'var(--lincoln-navy)', borderColor: 'var(--lincoln-navy)' },
        accent:    { background: 'var(--river-blue)', color: '#fff' },
        ghost:     { background: 'transparent', color: 'var(--lincoln-navy)' },
      };
      const [hover, setHover] = React.useState(false);
      const hoverStyles = {
        primary:   { background: 'var(--lincoln-navy-2)' },
        secondary: { background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)' },
        accent:    { background: 'var(--river-blue-2)' },
        ghost:     { background: 'rgba(31,46,61,0.06)' },
      };
      return (
        <button
          type={type}
          onClick={onClick}
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{ ...base, ...sizes[size], ...variants[variant], ...(hover ? hoverStyles[variant] : {}), ...style }}
        >{children}</button>
      );
    }

    function Tag({ tone = 'neutral', children }) {
      const tones = {
        neutral: { background: 'var(--bg-elevated)', color: 'var(--fg2)', border: '1px solid var(--border)' },
        filled:  { background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)', border: '1px solid var(--lincoln-navy)' },
        tan:     { background: 'var(--biscuit-tan)', color: 'var(--lincoln-navy)', border: '1px solid transparent' },
        clover:  { background: 'rgba(108,138,106,0.18)', color: 'var(--clover-2)', border: '1px solid transparent' },
        blue:    { background: 'rgba(91,138,168,0.18)', color: 'var(--river-blue-2)', border: '1px solid transparent' },
      };
      return <span style={{
        fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 500,
        padding: '6px 12px', borderRadius: 999, display: 'inline-block',
        ...tones[tone]
      }}>{children}</span>;
    }

    function StarRow({ count = 5 }) {
      return (
        <span style={{ display: 'inline-flex', gap: 2, color: 'var(--biscuit-tan)' }}>
          {Array.from({ length: count }).map((_, i) => (
            <Icon key={i} name="star" size={16} />
          ))}
        </span>
      );
    }

    function SectionHeading({ eyebrow, title, subtitle, align = 'left' }) {
      return (
        <div style={{ textAlign: align, maxWidth: 640, margin: align === 'center' ? '0 auto' : 0 }}>
          {eyebrow && <div className="eyebrow" style={{ color: 'var(--biscuit-tan-2)', marginBottom: 10 }}>{eyebrow}</div>}
          <h2 style={{ margin: '0 0 12px' }}>{title}</h2>
          {subtitle && <p style={{ color: 'var(--fg2)', margin: 0, fontSize: 17 }}>{subtitle}</p>}
        </div>
      );
    }

    function TopNav({ onBook }) {
      const links = [
        { id: 'hero', label: 'Home' },
        { id: 'services', label: 'Services' },
        { id: 'gallery', label: 'Gallery' },

                fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 20,

              {links.map(l => (

                  fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500,

            </nav>
            <div className="topnav-spacer" />
            <a href="tel:+12243574200" className="topnav-contact" style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg2)', display: 'flex', alignItems: 'center', gap: 6, textDecoration: 'none' }}>
              <Icon name="phone" size={14} /> (224) 357-4200

        </header>
      );
    }

            </div>
            <div>
              <div className="eyebrow" style={{ color: 'var(--biscuit-tan)', marginBottom: 14 }}>Contact</div>
              <div style={{ fontSize: 14, lineHeight: 1.7, color: 'rgba(246,239,228,0.85)' }}>

            <div>
              <div className="eyebrow" style={{ color: 'var(--biscuit-tan)', marginBottom: 14 }}>Hours</div>

    function ServiceCard({ eyebrow, title, description, icon, onBook }) {
      const [hover, setHover] = React.useState(false);
      return (
        <div
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background: 'var(--bg-elevated)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r-lg)',
            padding: 28,
            boxShadow: hover ? 'var(--shadow-md)' : 'var(--shadow-sm)',

    function titleCaseName(value) {
      return value
        .split(/\s+/)
        .filter(Boolean)
        .map(part => {
          if (part === '&') return part;
          return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
        })
        .join(' ');
    }

    function extractDogNames(alt) {
      const normalized = alt.trim();
      const explicit = normalized.match(/welcome to (?:the )?club\s+(.+?)(?:\s*[☘️🎄👻🤠💚♥️😭✨😁🐰🫧⭐️😎💕☁️🎀😂!]|$)/i);
      if (explicit) {
        return explicit[1]
          .split(/\s*&\s*/)
          .map(name => titleCaseName(name.replace(/[.!]+$/g, '').trim()))
          .filter(Boolean);
      }

      const matchers = [
        /^(Theo)’s\b/i,
        /\b(Bernard)\b/i,
        /^(Ralph)\s+and his new little brother\s+(Bernard)\b/i,
        /\bMiss\s+(Penny Lane)\b/i,
        /^(Duncan)\s+is the sweetest boy\b/i,
        /^((?:😁\s*)?Bear)\s+was all smiles\b/i,
        /^(Willow)\s+insisted on posing\b/i,
      ];

      for (const matcher of matchers) {
        const match = normalized.match(matcher);
        if (match) {
          return match.slice(1).filter(Boolean).map(titleCaseName);
        }
      }

      return [];
    }

    function buildFallbackLabel(photo, index) {
      const alt = photo.alt.trim();
      const genericTitles = [
        ['Club Portrait', 'Pinned from the salon'],
        ['Fresh Fluff', 'Pinned after pickup'],
        ['Camera Ready', 'Saved to the board'],
        ['Spa Day', 'Fresh from the tub'],
        ['Soft Coat', 'Another club favorite'],
        ['Salon Star', 'One more polished pup'],
      ];

      if (/Cute October things/i.test(alt)) return { title: 'October Cutie', subtitle: 'Seasonal club board' };
      if (/FLOOF/i.test(alt)) return { title: 'Big Sweet Floof', subtitle: 'Fluff level: expert' };
      if (/🫧|🛁|🧼/.test(alt)) return { title: 'Bubble Bath', subtitle: 'Suds, fluff, repeat' };
      if (/☁️/.test(alt)) return { title: 'Cloud Coat', subtitle: 'Soft finish, club approved' };
      if (/📸|😎|⭐️/.test(alt)) return { title: 'Camera Ready', subtitle: 'Pinned for the glow-up' };
      if (/tagging @thecleandogclub/i.test(alt)) return { title: 'Club Feature', subtitle: 'Shared on the inspiration board' };
      if (/Photo by/i.test(alt)) return genericTitles[index % genericTitles.length];

      return genericTitles[index % genericTitles.length];
    }

    function Lightbox({ open, index, photos, onClose, onPrev, onNext }) {
      React.useEffect(() => {
        if (!open) return;
        const onKey = (e) => {
          if (e.key === 'Escape') onClose();
          else if (e.key === 'ArrowLeft') onPrev();
          else if (e.key === 'ArrowRight') onNext();
        };
        document.addEventListener('keydown', onKey);
        const prevOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', onKey);
          document.body.style.overflow = prevOverflow;
        };
      }, [open, onClose, onPrev, onNext]);

      const touchStart = React.useRef(null);
      const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (touchStart.current == null) return;
        const dx = e.changedTouches[0].clientX - touchStart.current;
        if (Math.abs(dx) > 50) (dx < 0 ? onNext() : onPrev());
        touchStart.current = null;
      };

      if (!open) return null;
      const photo = photos[index];
      return (
        <div className="lightbox" onClick={onClose} role="dialog" aria-label="Photo viewer">
          <div className="lightbox-counter">{index + 1} / {photos.length}</div>
          <button className="lightbox-close" onClick={onClose} aria-label="Close">
            <Icon name="x" size={20} stroke={2} />
          </button>
          <button className="lightbox-btn prev" onClick={(e) => { e.stopPropagation(); onPrev(); }} aria-label="Previous photo">
            <Icon name="chevron-left" size={22} stroke={2} />
          </button>
          <div
            className="lightbox-stage"
            onClick={(e) => e.stopPropagation()}
            onTouchStart={onTouchStart}
            onTouchEnd={onTouchEnd}
          >
            <picture key={photo.id}>
              <source srcSet={photo.full} type="image/webp" />
              <img
                src={`assets/ig/${photo.id}.jpg`}
                alt={photo.alt}
              />

          <button className="lightbox-btn next" onClick={(e) => { e.stopPropagation(); onNext(); }} aria-label="Next photo">
            <Icon name="chevron-right" size={22} stroke={2} />
          </button>
        </div>
      );
    }

                {step === 1 ? (
                  <div style={{ display: 'grid', gap: 16 }}>
                    <Field label="Your name"><input value={form.name} onChange={e => upd('name', e.target.value)} /></Field>
                    <Field label="Dog's name"><input value={form.dog} onChange={e => upd('dog', e.target.value)} placeholder="e.g. Biscuit" /></Field>
                    <Field label="Service">
                      <select value={form.service} onChange={e => upd('service', e.target.value)}>
                        <option>Full grooming</option><option>Bath &amp; brush</option><option>Nail trim only</option>
                      </select>
                    </Field>
                    <Field label="Anything I should know?">
                      <textarea rows={3} value={form.notes} onChange={e => upd('notes', e.target.value)} placeholder="Sensitive ears, first groom, breed…"></textarea>
                    </Field>
                  </div>
                ) : (
                  <div style={{ display: 'grid', gap: 16 }}>
                    <Field label="Preferred day"><input type="date" value={form.date} onChange={e => upd('date', e.target.value)} /></Field>
                    <div style={{
                      background: 'var(--bg-elevated)', borderRadius: 12, padding: 16,
                      border: '1px solid var(--border)', display: 'flex', gap: 12, alignItems: 'flex-start'
                    }}>
                      <Icon name="info" size={18} style={{ color: 'var(--river-blue-2)', marginTop: 2 }} />
                      <div style={{ fontSize: 13.5, lineHeight: 1.55, color: 'var(--fg2)' }}>
                        This is a request, not a locked slot. I'll call you at the number you leave to confirm the time.
                      </div>
                    </div>
                  </div>
                )}
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 28 }}>
                  <Button variant="ghost" onClick={step === 1 ? onClose : () => setStep(1)}>
                    {step === 1 ? 'Cancel' : 'Back'}
                  </Button>
                  <Button onClick={() => setStep(step + 1)}>
                    {step === 1 ? 'Continue' : 'Send request'} <Icon name="arrow-right" size={14} />
                  </Button>
                </div>
              </>
            ) : (
              <div style={{ textAlign: 'center', padding: '20px 10px' }}>
                <div style={{
                  width: 56, height: 56, borderRadius: 999, background: 'var(--clover)', color: '#fff',
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18,
                }}><Icon name="check" size={26} /></div>
                <h2 style={{ margin: '0 0 8px' }}>Request sent.</h2>
                <p style={{ color: 'var(--fg2)', margin: '0 0 24px' }}>
                  Thanks {form.name || 'friend'} — I'll call you soon to confirm {form.dog || "your pup"}'s appointment.
                </p>
                <div className="signature" style={{ color: 'var(--biscuit-tan-2)', fontSize: 22, marginBottom: 22 }}>— Alexis</div>
                <Button onClick={onClose}>Close</Button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Field({ label, children }) {
      return (
        <label style={{ display: 'block' }}>
          <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 600, color: 'var(--fg2)', letterSpacing: '0.02em', display: 'block', marginBottom: 6 }}>{label}</span>
          {React.cloneElement(children, {
            style: {
              width: '100%', boxSizing: 'border-box', fontFamily: 'var(--font-body)', fontSize: 14,
              padding: '12px 14px', borderRadius: 8, border: '1px solid var(--border-strong)',
              background: 'var(--surface)', color: 'var(--fg1)', outline: 'none',
            }
          })}
        </label>
      );
    }

    /* --- App --- */
    function App() {
      const [booking, setBooking] = React.useState(false);
      const openBook = () => setBooking(true);
      return (
        <div>
          <TopNav onBook={openBook} />
          <Hero onBook={openBook} />
          <TrustStrip />
          <Testimonials />
          <Services onBook={openBook} />
          <PromiseBlock />
          <Gallery />
          <VisitBlock onBook={openBook} />
          <Footer />
          <BookingModal open={booking} onClose={() => setBooking(false)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
