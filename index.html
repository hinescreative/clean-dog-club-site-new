  <!-- Component Logic -->
  <script type="text/babel">
    /* --- Primitives --- */
    function Icon({ name, size = 20, stroke = 1.75, style }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const el = document.createElement('i');
          el.setAttribute('data-lucide', name);
          ref.current.appendChild(el);
          window.lucide.createIcons({ attrs: { 'stroke-width': stroke, width: size, height: size } });
        }
      }, [name, size, stroke]);
      return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', ...style }} />;
    }

    function Button({ variant = 'primary', size = 'md', children, onClick, style }) {
      const base = {
        fontFamily: 'var(--font-body)',
        fontWeight: 600,
        borderRadius: '999px',
        border: '1px solid transparent',
        cursor: 'pointer',
        transition: 'all 240ms cubic-bezier(0.25, 0.8, 0.25, 1)',
        display: 'inline-flex',
        alignItems: 'center',
        gap: 8,
        whiteSpace: 'nowrap',
      };
      const sizes = {
        sm: { padding: '8px 16px', fontSize: 13 },
        md: { padding: '12px 22px', fontSize: 14 },
        lg: { padding: '16px 28px', fontSize: 15 },
      };
      const variants = {
        primary:   { background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)' },
        secondary: { background: 'transparent', color: 'var(--lincoln-navy)', borderColor: 'var(--lincoln-navy)' },
        accent:    { background: 'var(--river-blue)', color: '#fff' },
        ghost:     { background: 'transparent', color: 'var(--lincoln-navy)' },
      };
      const [hover, setHover] = React.useState(false);
      const hoverStyles = {
        primary:   { background: 'var(--lincoln-navy-2)' },
        secondary: { background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)' },
        accent:    { background: 'var(--river-blue-2)' },
        ghost:     { background: 'rgba(31,46,61,0.06)' },
      };
      return (
        <button
          onClick={onClick}
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{ ...base, ...sizes[size], ...variants[variant], ...(hover ? hoverStyles[variant] : {}), ...style }}
        >{children}</button>
      );
    }

    function Tag({ tone = 'neutral', children }) {
      const tones = {
        neutral: { background: 'var(--bg-elevated)', color: 'var(--fg2)', border: '1px solid var(--border)' },
        filled:  { background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)', border: '1px solid var(--lincoln-navy)' },
        tan:     { background: 'var(--biscuit-tan)', color: 'var(--lincoln-navy)', border: '1px solid transparent' },
        clover:  { background: 'rgba(108,138,106,0.18)', color: 'var(--clover-2)', border: '1px solid transparent' },
        blue:    { background: 'rgba(91,138,168,0.18)', color: 'var(--river-blue-2)', border: '1px solid transparent' },
      };
      return <span style={{
        fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 500,
        padding: '6px 12px', borderRadius: 999, display: 'inline-block',
        ...tones[tone]
      }}>{children}</span>;
    }

    function StarRow({ count = 5 }) {
      return (
        <span style={{ display: 'inline-flex', gap: 2, color: 'var(--biscuit-tan)' }}>
          {Array.from({ length: count }).map((_, i) => (
            <Icon key={i} name="star" size={16} />
          ))}
        </span>
      );
    }

    function SectionHeading({ eyebrow, title, subtitle, align = 'left' }) {
      return (
        <div style={{ textAlign: align, maxWidth: 640, margin: align === 'center' ? '0 auto' : 0 }}>
          {eyebrow && <div className="eyebrow" style={{ color: 'var(--biscuit-tan-2)', marginBottom: 10 }}>{eyebrow}</div>}
          <h2 style={{ margin: '0 0 12px' }}>{title}</h2>
          {subtitle && <p style={{ color: 'var(--fg2)', margin: 0, fontSize: 17 }}>{subtitle}</p>}
        </div>
      );
    }

    function TopNav({ onBook, page, onNavigate }) {
      const links = [
        { id: 'hero', label: 'Home' },
        { id: 'services', label: 'Services' },
        { id: 'gallery', label: 'Gallery' },
        { id: 'visit', label: 'Visit' },
      ];
      return (
        <header style={{
          position: 'sticky', top: 0, zIndex: 10,
          background: 'rgba(246,239,228,0.88)', backdropFilter: 'blur(14px)',
          WebkitBackdropFilter: 'blur(14px)',
          borderBottom: '1px solid var(--border)',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '14px 48px', display: 'flex', alignItems: 'center', gap: 28 }}>
            <a href="#hero" style={{
              display: 'flex', alignItems: 'center', gap: 10,
              cursor: 'pointer', border: 'none', textDecoration: 'none'
            }}>
              <img src="assets/logo-real.png" alt="" style={{ width: 36, height: 36, borderRadius: 999, objectFit: 'cover' }} />
              <span style={{
                fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 20,
                color: 'var(--fg1)', letterSpacing: '-0.01em', whiteSpace: 'nowrap'
              }}>The Clean Dog Club</span>
            </a>
            <nav style={{ display: 'flex', gap: 22, marginLeft: 14 }}>
              {links.map(l => (
                <a key={l.id} href={`#${l.id}`} style={{
                  fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500,
                  color: 'var(--fg2)',
                  cursor: 'pointer', border: 'none',
                  paddingBottom: 2,
                }}>{l.label}</a>
              ))}
            </nav>
            <div style={{ flex: 1 }} />
            <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg2)', display: 'flex', alignItems: 'center', gap: 6, textDecoration: 'none' }}>
              <Icon name="phone" size={14} /> (224) 357-4200
            </div>
            <Button size="sm" onClick={onBook}>Book appointment</Button>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer style={{
          background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)',
          marginTop: 96, padding: '64px 48px 40px'
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 48 }}>
            <div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, marginBottom: 10 }}>The Clean Dog Club</div>
              <p style={{ color: 'rgba(246,239,228,0.72)', fontSize: 14, lineHeight: 1.6, maxWidth: 320 }}>
                A quiet, one-on-one dog &amp; cat grooming salon in Fox River Grove, Illinois. Every pup has the groomer's full attention.
              </p>
              <div className="signature" style={{ color: 'var(--biscuit-tan)', marginTop: 18 }}>— Alexis &amp; Lyn</div>
            </div>
            <div>
              <div className="eyebrow" style={{ color: 'var(--biscuit-tan)', marginBottom: 14 }}>Visit</div>
              <div style={{ fontSize: 14, lineHeight: 1.7, color: 'rgba(246,239,228,0.85)' }}>
                411 Lincoln Ave<br/>Fox River Grove, IL 60021
              </div>
            </div>
            <div>
              <div className="eyebrow" style={{ color: 'var(--biscuit-tan)', marginBottom: 14 }}>Contact</div>
              <div style={{ fontSize: 14, lineHeight: 1.7, color: 'rgba(246,239,228,0.85)' }}>
                (224) 357-4200<br/>thecleandogclub@gmail.com
              </div>
            </div>
            <div>
              <div className="eyebrow" style={{ color: 'var(--biscuit-tan)', marginBottom: 14 }}>Hours</div>
              <div style={{ fontSize: 13, lineHeight: 1.7, color: 'rgba(246,239,228,0.85)' }}>
                Mon–Thu · 9–5:30<br/>Fri · 9–2<br/>Sat · 10–2<br/>Sun · closed
              </div>
            </div>
          </div>
          <div style={{ maxWidth: 1200, margin: '48px auto 0', paddingTop: 24, borderTop: '1px solid rgba(246,239,228,0.18)', display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'rgba(246,239,228,0.5)' }}>
            <span>© 2026 The Clean Dog Club LLC</span>
            <span>13 years grooming · Cage-free, always</span>
          </div>
        </footer>
      );
    }

    function ServiceCard({ eyebrow, title, description, price, priceNote, icon, onBook }) {
      const [hover, setHover] = React.useState(false);
      return (
        <div
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background: 'var(--bg-elevated)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r-lg)',
            padding: 28,
            boxShadow: hover ? 'var(--shadow-md)' : 'var(--shadow-sm)',
            transform: hover ? 'translateY(-2px)' : 'translateY(0)',
            transition: 'all 240ms cubic-bezier(0.25,0.8,0.25,1)',
            display: 'flex', flexDirection: 'column', gap: 14,
          }}>
          <div style={{
            width: 44, height: 44, borderRadius: 12, background: 'var(--bg)',
            border: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'var(--lincoln-navy)'
          }}><Icon name={icon} size={22} /></div>
          <div className="eyebrow" style={{ color: 'var(--biscuit-tan-2)' }}>{eyebrow}</div>
          <h3 style={{ margin: 0 }}>{title}</h3>
          <p style={{ margin: 0, color: 'var(--fg2)', fontSize: 14.5, lineHeight: 1.65 }}>{description}</p>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 'auto', paddingTop: 8 }}>
            <span style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 26 }}>{price}</span>
            <span style={{ fontSize: 12, color: 'var(--fg3)' }}>{priceNote}</span>
          </div>
          <Button variant="secondary" size="sm" onClick={onBook}>Book this</Button>
        </div>
      );
    }

    /* --- Sections --- */
    function Hero({ onBook }) {
      return (
        <section id="hero" style={{

    function PromiseBlock() {
      return (
        <section style={{ maxWidth: 1200, margin: '96px auto 0', padding: '0 48px' }}>
          <div style={{
            background: 'var(--lincoln-navy)', color: 'var(--sudsy-cream)',
            borderRadius: 24, padding: '64px 56px',
            display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: 56, alignItems: 'center',
          }}>
            <div>
              <div className="eyebrow" style={{ color: 'var(--biscuit-tan)', marginBottom: 14 }}>The Clean Dog Club promise</div>
              <h2 style={{ fontSize: 44, lineHeight: 1.05, margin: 0, color: 'var(--sudsy-cream)' }}>
                Your dog, undivided.
              </h2>
            </div>
            <div>
              <p style={{ fontSize: 17, lineHeight: 1.7, color: 'rgba(246,239,228,0.88)', margin: 0 }}>
                No more waiting hours and wondering what your dog is doing. When your pup is here, they have my full attention from the moment they walk in until they leave. After the groom, they're free to roam the shop or look out the big front window waiting for you.
              </p>
              <div className="signature" style={{ fontSize: 24, color: 'var(--biscuit-tan)', marginTop: 22 }}>— Alexis Rivera, owner &amp; groomer</div>
            </div>
          </div>

      );

    /* IG manifest injected as JSON at page load */
    const IG_PHOTOS = JSON.parse(document.getElementById('ig-manifest').textContent);
    /* Feature positions spaced across 40 tiles for rhythm in the bento grid */
    const FEATURE_INDICES = new Set([0, 11, 22, 33]);

    function PhotoTile({ photo, index, onOpen, featured }) {
      const fallbackJpg = `assets/ig/${photo.id}.jpg`;
      return (
        <button
          type="button"
          className={`photo-tile ${featured ? 'feature' : ''}`}
          onClick={() => onOpen(index)}
          style={{ border: 'none', padding: 0, font: 'inherit' }}
          aria-label={`Open photo: ${photo.alt}`}
        >
          <picture>
            <source
              type="image/webp"
              srcSet={`${photo.thumb} 400w, ${photo.full} 1200w`}
              sizes={featured ? '(max-width: 560px) 100vw, (max-width: 900px) 66vw, 50vw'
                              : '(max-width: 560px) 50vw, (max-width: 900px) 33vw, 25vw'}
            />
            <img
              src={fallbackJpg}
              alt={photo.alt}
              width="600" height="600"
              loading={index < 6 ? 'eager' : 'lazy'}
              decoding="async"
            />
          </picture>
          <span className="tile-icon" aria-hidden="true">
            <Icon name="zoom-in" size={16} stroke={2} />
          </span>
        </button>
      );
    }

    function Lightbox({ open, index, photos, onClose, onPrev, onNext }) {
      React.useEffect(() => {
        if (!open) return;
        const onKey = (e) => {
          if (e.key === 'Escape') onClose();
          else if (e.key === 'ArrowLeft') onPrev();
          else if (e.key === 'ArrowRight') onNext();
        };
        document.addEventListener('keydown', onKey);
        const prevOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', onKey);
          document.body.style.overflow = prevOverflow;
        };
      }, [open, onClose, onPrev, onNext]);

      const touchStart = React.useRef(null);
      const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (touchStart.current == null) return;
        const dx = e.changedTouches[0].clientX - touchStart.current;
        if (Math.abs(dx) > 50) (dx < 0 ? onNext() : onPrev());
        touchStart.current = null;
      };

      if (!open) return null;
      const photo = photos[index];
      return (
        <div className="lightbox" onClick={onClose} role="dialog" aria-label="Photo viewer">
          <div className="lightbox-counter">{index + 1} / {photos.length}</div>
          <button className="lightbox-close" onClick={onClose} aria-label="Close">
            <Icon name="x" size={20} stroke={2} />
          </button>
          <button className="lightbox-btn prev" onClick={(e) => { e.stopPropagation(); onPrev(); }} aria-label="Previous photo">
            <Icon name="chevron-left" size={22} stroke={2} />
          </button>
          <div
            className="lightbox-stage"
            onClick={(e) => e.stopPropagation()}
            onTouchStart={onTouchStart}
            onTouchEnd={onTouchEnd}
          >
            <picture key={photo.id}>
              <source srcSet={photo.full} type="image/webp" />
              <img
                src={`assets/ig/${photo.id}.jpg`}
                alt={photo.alt}
              />
            </picture>
            {photo.alt && photo.alt.length < 140 && !photo.alt.startsWith('Photo ') && (
              <div className="lightbox-caption">{photo.alt}</div>
            )}
          </div>
          <button className="lightbox-btn next" onClick={(e) => { e.stopPropagation(); onNext(); }} aria-label="Next photo">
            <Icon name="chevron-right" size={22} stroke={2} />
          </button>
        </div>
      );
    }

    function Gallery() {
      const photos = IG_PHOTOS;
      const count = photos.length;
      const [active, setActive] = React.useState(null);
      const open = active !== null;
      const close = () => setActive(null);
      const prev = () => setActive(i => (i - 1 + count) % count);
      const next = () => setActive(i => (i + 1) % count);

      return (
        <section id="gallery" style={{ maxWidth: 1200, margin: '96px auto 0', padding: '0 48px' }}>
          <SectionHeading
            eyebrow="The pack"
            title={<>Fresh haircuts, happy faces.</>}
            subtitle="Every dog that leaves the shop gets a photo — so you know exactly how they did."
          />
          <div className="bento">
            {photos.map((photo, i) => (
              <PhotoTile
                key={photo.id}
                photo={photo}
                index={i}
                featured={FEATURE_INDICES.has(i)}
                onOpen={setActive}
              />
            ))}
          </div>
          <div style={{ textAlign: 'center', marginTop: 32 }}>
            <a href="https://www.instagram.com/thecleandogclub" target="_blank" rel="noreferrer"
               style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--fg2)', textDecoration: 'underline', textUnderlineOffset: 3 }}>
              See more on Instagram →
            </a>
          </div>
          <Lightbox
            open={open}
            index={active ?? 0}
            photos={photos}
            onClose={close}
            onPrev={prev}
            onNext={next}
          />
        </section>
      );
    }

    function Testimonials() {
      const reviews = [
        { quote: 'He looks and smells amazing! Alexis is so friendly and attentive and we definitely know she absolutely loves dogs. Our pup was so relaxed with her.', who: 'M. D.', src: 'Nextdoor' },
        { quote: "If you're looking for a groomer that provides peace of mind and actual care towards the health of hair and skin of your furry friends, then Alexis is the one.", who: 'Yelp review', src: 'Yelp' },
        { quote: "The only groomer my dogs have ever been excited to be dropped off at. They treat them like family.", who: 'Yelp review', src: 'Yelp' },
      ];
      return (
        <section style={{ maxWidth: 1200, margin: '96px auto 0', padding: '0 48px' }}>
          <SectionHeading eyebrow="Neighbors are saying" title="Five stars, one dog at a time." align="center" />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20, marginTop: 40 }}>
            {reviews.map((r, i) => (
              <div key={i} style={{
                background: 'var(--bg-elevated)', border: '1px solid var(--border)',
                borderRadius: 16, padding: 28,
              }}>
                <StarRow />
                <p style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 18, lineHeight: 1.5, margin: '14px 0 18px', fontStyle: 'italic', color: 'var(--fg1)' }}>
                  "{r.quote}"
                </p>
                <div style={{ fontSize: 13, color: 'var(--fg2)' }}>
                  <strong style={{ color: 'var(--fg1)' }}>{r.who}</strong> · <span style={{ color: 'var(--fg3)' }}>{r.src}</span>
                </div>
              </div>

        </section>

    function VisitBlock({ onBook }) {
      return (
        <section id="visit" style={{ maxWidth: 1200, margin: '96px auto 0', padding: '0 48px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'start' }}>
            <div>
              <SectionHeading eyebrow="Visit" title="Stop by or call." />
              <div style={{ marginTop: 32, display: 'grid', gap: 18 }}>
                <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                  <Icon name="map-pin" size={18} style={{ color: 'var(--biscuit-tan-2)', marginTop: 4 }} />
                  <div><div style={{ fontWeight: 600 }}>411 Lincoln Ave</div><div style={{ color: 'var(--fg2)' }}>Fox River Grove, IL 60021</div></div>
                </div>
                <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                  <Icon name="phone" size={18} style={{ color: 'var(--biscuit-tan-2)', marginTop: 4 }} />
                  <div><div style={{ fontWeight: 600 }}>(224) 357-4200</div><div style={{ color: 'var(--fg2)' }}>thecleandogclub@gmail.com</div></div>
                </div>
                <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                  <Icon name="calendar" size={18} style={{ color: 'var(--biscuit-tan-2)', marginTop: 4 }} />
                  <div>
                    <div style={{ fontWeight: 600 }}>By appointment</div>
                    <div style={{ color: 'var(--fg2)' }}>Mon–Thu 9–5:30 · Fri 9–2 · Sat 10–2 · Sun closed</div>
                  </div>
                </div>
              </div>
              <div style={{ marginTop: 28 }}><Button size="lg" onClick={onBook}>Book an appointment</Button></div>
            </div>
            <div style={{
              aspectRatio: '1/1', borderRadius: 24,
              background: 'linear-gradient(135deg, #EFE6D6, #C9A07A)',
              border: '1px solid var(--border)', position: 'relative', overflow: 'hidden',
            }}>
              <svg viewBox="0 0 400 400" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
                <path d="M0 220 Q 120 180 200 230 T 400 240" stroke="#5B8AA8" strokeWidth="22" fill="none" opacity="0.6"/>
                <path d="M50 0 L 60 400" stroke="#1F2E3D" strokeWidth="2" opacity="0.35"/>
                <path d="M0 120 L 400 110" stroke="#1F2E3D" strokeWidth="2" opacity="0.35"/>
                <path d="M0 320 L 400 330" stroke="#1F2E3D" strokeWidth="2" opacity="0.35"/>
                <path d="M240 0 L 260 400" stroke="#1F2E3D" strokeWidth="2" opacity="0.35"/>
                <circle cx="200" cy="200" r="14" fill="#1F2E3D"/>
                <circle cx="200" cy="200" r="5" fill="#F6EFE4"/>
              </svg>
              <div style={{
                position: 'absolute', bottom: 20, left: 20,
                background: 'var(--bg)', borderRadius: 12, padding: '10px 14px',
                fontSize: 13, fontWeight: 600, color: 'var(--fg1)',
                boxShadow: 'var(--shadow-sm)',
              }}>411 Lincoln Ave, Fox River Grove</div>
            </div>
          </div>
        </section>
      );
    }

    function BookingModal({ open, onClose }) {
      const [step, setStep] = React.useState(1);
      const [form, setForm] = React.useState({ name: '', dog: '', service: 'Full grooming', date: '', notes: '' });
      if (!open) return null;
      const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));

      return (
        <div onClick={onClose} style={{
          position: 'fixed', inset: 0, background: 'rgba(31,46,61,0.55)',
          backdropFilter: 'blur(4px)', zIndex: 50,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: 'var(--bg)', borderRadius: 24, width: 560, maxWidth: '100%',
            padding: 36, boxShadow: 'var(--shadow-lg)', border: '1px solid var(--border)'
          }}>
            {step < 3 ? (
              <>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                  <div className="eyebrow" style={{ color: 'var(--biscuit-tan-2)' }}>Step {step} of 2</div>
                  <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--fg2)' }}>
                    <Icon name="x" size={18} />
                  </button>
                </div>
                <h2 style={{ margin: '0 0 8px', fontSize: 32 }}>
                  {step === 1 ? 'Tell me about your pup.' : 'When works for you?'}
                </h2>
                <p style={{ margin: '0 0 26px', color: 'var(--fg2)' }}>
                  {step === 1 ? "I'll call you back within a day to confirm." : "I'll do my best to match what you pick."}
                </p>
                {step === 1 ? (
                  <div style={{ display: 'grid', gap: 16 }}>
                    <Field label="Your name"><input value={form.name} onChange={e => upd('name', e.target.value)} /></Field>
                    <Field label="Dog's name"><input value={form.dog} onChange={e => upd('dog', e.target.value)} placeholder="e.g. Biscuit" /></Field>
                    <Field label="Service">
                      <select value={form.service} onChange={e => upd('service', e.target.value)}>
                        <option>Full grooming</option><option>Bath &amp; brush</option><option>Nail trim only</option>
                      </select>
                    </Field>
                    <Field label="Anything I should know?">
                      <textarea rows={3} value={form.notes} onChange={e => upd('notes', e.target.value)} placeholder="Sensitive ears, first groom, breed…"></textarea>
                    </Field>
                  </div>
                ) : (
                  <div style={{ display: 'grid', gap: 16 }}>
                    <Field label="Preferred day"><input type="date" value={form.date} onChange={e => upd('date', e.target.value)} /></Field>
                    <div style={{
                      background: 'var(--bg-elevated)', borderRadius: 12, padding: 16,
                      border: '1px solid var(--border)', display: 'flex', gap: 12, alignItems: 'flex-start'
                    }}>
                      <Icon name="info" size={18} style={{ color: 'var(--river-blue-2)', marginTop: 2 }} />
                      <div style={{ fontSize: 13.5, lineHeight: 1.55, color: 'var(--fg2)' }}>
                        This is a request, not a locked slot. I'll call you at the number you leave to confirm the time.
                      </div>
                    </div>
                  </div>
                )}
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 28 }}>
                  <Button variant="ghost" onClick={step === 1 ? onClose : () => setStep(1)}>
                    {step === 1 ? 'Cancel' : 'Back'}
                  </Button>
                  <Button onClick={() => setStep(step + 1)}>
                    {step === 1 ? 'Continue' : 'Send request'} <Icon name="arrow-right" size={14} />
                  </Button>
                </div>
              </>
            ) : (
              <div style={{ textAlign: 'center', padding: '20px 10px' }}>
                <div style={{
                  width: 56, height: 56, borderRadius: 999, background: 'var(--clover)', color: '#fff',
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18,
                }}><Icon name="check" size={26} /></div>
                <h2 style={{ margin: '0 0 8px' }}>Request sent.</h2>
                <p style={{ color: 'var(--fg2)', margin: '0 0 24px' }}>
                  Thanks {form.name || 'friend'} — I'll call you soon to confirm {form.dog || "your pup"}'s appointment.
                </p>
                <div className="signature" style={{ color: 'var(--biscuit-tan-2)', fontSize: 22, marginBottom: 22 }}>— Alexis</div>
                <Button onClick={onClose}>Close</Button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Field({ label, children }) {
      return (
        <label style={{ display: 'block' }}>
          <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 600, color: 'var(--fg2)', letterSpacing: '0.02em', display: 'block', marginBottom: 6 }}>{label}</span>
          {React.cloneElement(children, {
            style: {
              width: '100%', boxSizing: 'border-box', fontFamily: 'var(--font-body)', fontSize: 14,
              padding: '12px 14px', borderRadius: 8, border: '1px solid var(--border-strong)',
              background: 'var(--surface)', color: 'var(--fg1)', outline: 'none',
            }
          })}
        </label>
      );
    }

    /* --- App --- */
    function App() {
      const [booking, setBooking] = React.useState(false);
      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, []);
      const openBook = () => setBooking(true);
      return (
        <div>
          <TopNav onBook={openBook} />
          <Hero onBook={openBook} />
          <TrustStrip />
          <Services onBook={openBook} />
          <PromiseBlock />
          <Gallery />
          <Testimonials />
          <VisitBlock onBook={openBook} />
          <Footer />
          <BookingModal open={booking} onClose={() => setBooking(false)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
